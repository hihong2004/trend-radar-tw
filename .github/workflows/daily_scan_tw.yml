# .github/workflows/daily_scan_tw.yml
# 台股收盤後自動掃描（台灣 14:30 = UTC 06:30）

name: Daily TW Scan

on:
  schedule:
    - cron: "30 6 * * 1-5"  # UTC 06:30 = 台灣 14:30
  workflow_dispatch:

jobs:
  daily-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: cache/
          key: tw-cache-${{ github.run_number }}
          restore-keys: tw-cache-

      - name: Clean old cache
        run: |
          rm -f cache/universe_tw.json
          echo "Cleared universe cache to force refresh"

      - name: Run daily scan
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python daily_scan.py --always-send

      - name: Save cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: cache/
          key: tw-cache-${{ github.run_number }}

      - if: failure()
        run: echo "::error::TW scan failed."
